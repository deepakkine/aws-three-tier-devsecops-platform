apiVersion: v1
kind: Service
metadata:
  name: {{ include "three-tier-app.fullname" . }}-mongodb
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "three-tier-app.labels" . | nindent 4 }}
spec:
  selector:
    app: mongodb

  ports:
    - port: {{ .Values.mongodb.service.port }}
      targetPort: {{ .Values.mongodb.service.port }}