apiVersion: v1
kind: Service

metadata:
  name: {{ include "three-tier-app.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "three-tier-app.labels" . | nindent 4 }}

spec:
  type: ClusterIP

  selector:
    app: frontend

  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
      protocol: TCP