apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "three-tier-app.fullname" . }}-mongodb-pvc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "three-tier-app.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce

  storageClassName: {{ .Values.mongodb.persistence.storageClass }}

  resources:
    requests:
      storage: {{ .Values.mongodb.persistence.size }}