name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "app/**"
      - "helm/**"
      - "terraform/**"
      - "monitoring/**"
      - "security/**"
      - "docker-compose.yml"

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  IMAGE_TAG: v${{ github.run_number }}

  CLUSTER_NAME: aws-three-tier-devsecops-platform-dev

  BACKEND_REPOSITORY: aws-three-tier-devsecops-platform-dev-backend
  FRONTEND_REPOSITORY: aws-three-tier-devsecops-platform-dev-frontend

#################################################
# Jobs
#################################################

jobs:

#################################################
# Security
#################################################

  security:

    name: Security Scan

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

#################################################
# Checkout
#################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

#################################################
# Configure AWS Credentials (OIDC)
#################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::848504403730:role/aws-three-tier-devsecops-platform-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

#################################################
# Verify AWS Identity
#################################################

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

#################################################
# Trivy Backend Filesystem Scan
#################################################

      - name: Trivy Backend Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./app/backend
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

#################################################
# Trivy Frontend Filesystem Scan
#################################################

      - name: Trivy Frontend Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./app/frontend
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

#################################################
# Build
#################################################

  build:

    name: Build, Push & Scan Images

    needs: security

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::848504403730:role/aws-three-tier-devsecops-platform-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

#################################################
# Login to Amazon ECR
#################################################

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

#################################################
# Setup Docker Buildx
#################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

#################################################
# Docker Cache
#################################################

      - name: Docker Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

#################################################
# Build Backend Image
#################################################

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

#################################################
# Build Frontend Image
#################################################

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          build-args: |
            REACT_APP_BACKEND_URL=/api/tasks
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

#################################################
# Update Docker Cache
#################################################

      - name: Update Docker Cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

#################################################
# Trivy Backend Image Scan
#################################################

      - name: Trivy Backend Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

#################################################
# Trivy Frontend Image Scan
#################################################

      - name: Trivy Frontend Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

#################################################
# Deploy
#################################################

  deploy:

    name: Deploy & Verify

    needs: build

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::848504403730:role/aws-three-tier-devsecops-platform-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

#################################################
# Setup kubectl
#################################################

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

#################################################
# Setup Helm
#################################################

      - name: Setup Helm
        uses: azure/setup-helm@v4

#################################################
# Configure kubeconfig
#################################################

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $CLUSTER_NAME \
            --region $AWS_REGION

#################################################
# Verify Cluster
#################################################

      - name: Verify Cluster
        run: |
          kubectl get nodes
          kubectl get pods -A
          helm version

#################################################
# Deploy Application
#################################################

      - name: Deploy Application
        run: |
          helm upgrade --install three-tier-app ./helm/three-tier-app \
            --namespace three-tier-app \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set backend.image.tag=$IMAGE_TAG \
            --set frontend.image.tag=$IMAGE_TAG

#################################################
# Verify Rollout
#################################################

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/three-tier-app-three-tier-app-backend \
            -n three-tier-app --timeout=5m

          kubectl rollout status deployment/three-tier-app-three-tier-app-frontend \
            -n three-tier-app --timeout=5m

          kubectl rollout status deployment/three-tier-app-three-tier-app-mongodb \
            -n three-tier-app --timeout=5m

#################################################
# Kubernetes Resources
#################################################

      - name: Kubernetes Resources
        run: |
          kubectl get all -n three-tier-app
          kubectl get ingress -n three-tier-app

#################################################
# Deployment Summary
#################################################

      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "Deployment Successful"
          echo "=========================================="
          echo "Backend Image : $BACKEND_REPOSITORY:$IMAGE_TAG"
          echo "Frontend Image: $FRONTEND_REPOSITORY:$IMAGE_TAG"
          echo "Cluster       : $CLUSTER_NAME"
          echo "=========================================="