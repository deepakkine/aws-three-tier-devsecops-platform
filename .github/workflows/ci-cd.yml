name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  CLUSTER_NAME: aws-three-tier-devsecops-platform-dev

  BACKEND_REPOSITORY: aws-three-tier-devsecops-platform-dev-backend
  FRONTEND_REPOSITORY: aws-three-tier-devsecops-platform-dev-frontend

jobs:
  deploy:
    name: Build Push Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      IMAGE_TAG: v${{ github.run_number }}

    steps:

      #################################################
      # Checkout Repository
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################
      # Configure AWS Credentials
      #################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #################################################
      # Login to Amazon ECR
      #################################################

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      #################################################
      # Setup Docker Buildx
      #################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #################################################
      # Image Version
      #################################################

      - name: Show Image Version
        run: |
          echo "IMAGE_TAG=$IMAGE_TAG"

      #################################################
      # Trivy Backend Filesystem Scan
      #################################################

      - name: Trivy Backend Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./app/backend
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      #################################################
      # Trivy Frontend Filesystem Scan
      #################################################

      - name: Trivy Frontend Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./app/frontend
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      #################################################
      # Build Backend Image
      #################################################

      - name: Build Backend Image
        run: |
          docker build \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPOSITORY:$IMAGE_TAG \
            ./app/backend

      #################################################
      # Push Backend Image
      #################################################

      - name: Push Backend Image
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPOSITORY:$IMAGE_TAG

      #################################################
      # Build Frontend Image
      #################################################

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL=/api/tasks \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPOSITORY:$IMAGE_TAG \
            ./app/frontend

      #################################################
      # Push Frontend Image
      #################################################

      - name: Push Frontend Image
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPOSITORY:$IMAGE_TAG

      #################################################
      # Trivy Backend Image Scan
      #################################################

      - name: Trivy Backend Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      #################################################
      # Trivy Frontend Image Scan
      #################################################

      - name: Trivy Frontend Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      #################################################
      # Setup kubectl
      #################################################

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      #################################################
      # Setup Helm
      #################################################

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      #################################################
      # Configure kubeconfig
      #################################################

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $CLUSTER_NAME \
            --region $AWS_REGION

      #################################################
      # Verify Cluster
      #################################################

      - name: Verify Cluster
        run: |
          kubectl get nodes
          kubectl get pods -A
          helm version

      #################################################
      # Deploy Application
      #################################################

      - name: Deploy Application
        run: |
          helm upgrade --install three-tier-app ./helm/three-tier-app \
            --namespace three-tier-app \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set backend.image.tag=$IMAGE_TAG \
            --set frontend.image.tag=$IMAGE_TAG

      #################################################
      # Verify Rollout
      #################################################

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/three-tier-app-three-tier-app-backend \
            -n three-tier-app --timeout=5m

          kubectl rollout status deployment/three-tier-app-three-tier-app-frontend \
            -n three-tier-app --timeout=5m

          kubectl rollout status deployment/three-tier-app-three-tier-app-mongodb \
            -n three-tier-app --timeout=5m

      #################################################
      # Kubernetes Resources
      #################################################

      - name: Kubernetes Resources
        run: |
          kubectl get all -n three-tier-app
          kubectl get ingress -n three-tier-app

      #################################################
      # Deployment Summary
      #################################################

      - name: Deployment Summary
        run: |
          echo "Deployment completed successfully."
          echo "Image Version : $IMAGE_TAG"
          echo "Backend Image : $BACKEND_REPOSITORY:$IMAGE_TAG"
          echo "Frontend Image: $FRONTEND_REPOSITORY:$IMAGE_TAG"