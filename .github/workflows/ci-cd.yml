name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  CLUSTER_NAME: aws-three-tier-devsecops-platform-dev

  BACKEND_REPOSITORY: aws-three-tier-devsecops-platform-dev-backend
  FRONTEND_REPOSITORY: aws-three-tier-devsecops-platform-dev-frontend

jobs:
  deploy:
    name: Build Push Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      #################################################
      # Checkout
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################
      # AWS
      #################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS Identity
        run: |
          echo "========================"
          aws sts get-caller-identity
          echo "========================"

          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"

          aws configure list

          aws iam get-user

      #################################################
      # Docker Buildx
      #################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #################################################
      # Login ECR
      #################################################

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      #################################################
      # Build Backend
      #################################################

      - name: Build Backend Image
        run: |
          docker build \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPOSITORY:${{ github.sha }} \
            ./app/backend

      - name: Push Backend Image
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPOSITORY:${{ github.sha }}

      #################################################
      # Build Frontend
      #################################################

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL=/api/tasks \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPOSITORY:${{ github.sha }} \
            ./app/frontend

      - name: Push Frontend Image
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPOSITORY:${{ github.sha }}

      #################################################
      # Install kubectl
      #################################################

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      #################################################
      # Install Helm
      #################################################

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      #################################################
      # Configure kubeconfig
      #################################################

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $CLUSTER_NAME \
            --region $AWS_REGION

      #################################################
      # DEBUG
      #################################################

      - name: Show kubeconfig
        run: |
          echo "===== KUBECONFIG ====="
          cat ~/.kube/config

      - name: Test EKS Token
        run: |
          aws eks get-token \
            --cluster-name $CLUSTER_NAME \
            --region $AWS_REGION

          echo ""

          aws sts get-caller-identity

      #################################################
      # Verify Cluster
      #################################################

      - name: Verify Cluster
        run: |
          echo "===== CURRENT CONTEXT ====="
          kubectl config current-context

          echo ""
          echo "===== CONFIG ====="
          kubectl config view

          echo ""
          echo "===== HELM VERSION ====="
          helm version

          echo ""
          echo "===== GET NODES (VERBOSE) ====="
          kubectl get nodes -v=8

      #################################################
      # Deploy
      #################################################

      - name: Deploy Application
        run: |
          helm upgrade --install three-tier-app ./helm/three-tier-app \
            --namespace three-tier-app \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }}

      #################################################
      # Verify Rollout
      #################################################

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/three-tier-app-three-tier-app-backend \
            -n three-tier-app \
            --timeout=5m

          kubectl rollout status deployment/three-tier-app-three-tier-app-frontend \
            -n three-tier-app \
            --timeout=5m

          kubectl rollout status deployment/three-tier-app-three-tier-app-mongodb \
            -n three-tier-app \
            --timeout=5m

      #################################################
      # Show Resources
      #################################################

      - name: Kubernetes Resources
        run: |
          kubectl get all -n three-tier-app
          kubectl get ingress -n three-tier-app